server.port=${PORT:8080}
spring.application.name=online-voting-system
spring.jackson.default-property-inclusion=non_null

spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/voting?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DATABASE_USERNAME:root}
spring.datasource.password=${DATABASE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.sql.init.mode=always
